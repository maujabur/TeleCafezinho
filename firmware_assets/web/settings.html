<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/app.css">
    <title>TeleSystem - Ajustes</title>
  </head>
  <body>
    <main class="shell">
      <nav class="tech-nav" aria-label="Navegacao tecnica">
        <a href="/">Inicio</a>
        <div class="links">
          <a href="/status">Status</a>
          <a href="/networks">Redes</a>
          <a href="/ota">OTA</a>
          <a href="/settings">Ajustes</a>
          <a href="/logs">Logs</a>
        </div>
      </nav>

      <header>
        <div>
          <h1>Ajustes Tecnicos</h1>
          <p class="subtle" id="settingsStatus">Ultima atualizacao: --</p>
        </div>
        <div class="actions">
          <button class="secondary" type="button" onclick="loadAll()">Atualizar</button>
          <button class="secondary" type="button" onclick="exportSettings()">Exportar</button>
        </div>
      </header>

      <details open>
        <summary>TeleCafezinho</summary>
        <div class="content">
          <div class="grid">
            <div>
              <label for="telecafeGroup">Grupo</label>
              <input id="telecafeGroup" maxlength="31" autocomplete="off">
            </div>
            <div>
              <label for="telecafeSignalSource">Origem do sinal</label>
              <select id="telecafeSignalSource">
                <option value="gpio">GPIO</option>
              </select>
            </div>
            <div>
              <label for="telecafeGpioNum">GPIO</label>
              <input id="telecafeGpioNum" type="number" min="-1" max="48" value="-1">
            </div>
            <div>
              <label for="telecafeGpioActiveLevel">Nivel ativo</label>
              <select id="telecafeGpioActiveLevel">
                <option value="1">Alto</option>
                <option value="0">Baixo</option>
              </select>
            </div>
            <div>
              <label for="telecafeGpioDebounceMs">Debounce (ms)</label>
              <input id="telecafeGpioDebounceMs" type="number" min="20" max="5000" value="150">
            </div>
            <div>
              <label for="telecafeSignalTtlS">TTL do sinal (s)</label>
              <input id="telecafeSignalTtlS" type="number" min="2" max="3600" value="20">
            </div>
            <div>
              <label for="telecafePublishIntervalS">Intervalo publish (s)</label>
              <input id="telecafePublishIntervalS" type="number" min="1" max="3600" value="5">
            </div>
            <button type="button" onclick="saveTeleCafezinho()">Salvar TeleCafezinho</button>
            <button class="secondary" type="button" onclick="resetTeleCafezinho()">Reset defaults</button>
          </div>
          <div class="readout" id="telecafeReadout">TeleCafezinho: --</div>
        </div>
      </details>

      <details open>
        <summary>Conectividade</summary>
        <div class="content">
          <div class="grid">
            <div>
              <label for="wifiProvisioningSsid">SSID provisioning AP</label>
              <input id="wifiProvisioningSsid" maxlength="32" autocomplete="off">
            </div>
            <div>
              <label for="wifiStaMaxRetry">Retry maximo STA</label>
              <input id="wifiStaMaxRetry" type="number" min="1" max="20" value="3">
            </div>
            <div>
              <label for="wifiApstaPolicy">Politica APSTA</label>
              <select id="wifiApstaPolicy">
                <option value="0">Always on</option>
                <option value="1">Auto timeout</option>
                <option value="2">STA only</option>
              </select>
            </div>
            <div>
              <label for="wifiApstaGrace">Janela APSTA (s)</label>
              <input id="wifiApstaGrace" type="number" min="30" max="3600" value="600">
            </div>
            <button type="button" onclick="saveDeviceConnectivity()">Salvar conectividade</button>
            <button class="secondary" type="button" onclick="resetDeviceConnectivity()">Reset defaults</button>
          </div>
          <div class="readout" id="wifiReadout">Wi-Fi: --</div>
        </div>
      </details>

      <details>
        <summary>Sistema</summary>
        <div class="content">
          <div class="readout" id="systemReadout">Sistema: --</div>
          <button class="danger" type="button" onclick="restartDevice()">Restart</button>
        </div>
      </details>

      <div id="banner" class="banner"></div>
    </main>

    <script>
      const CONFIG_IDS = {
        provisioningSsid: "wifi.provisioning_ssid",
        staMaxRetry: "wifi.sta_max_retry",
        apstaPolicy: "wifi.apsta_policy",
        apstaGrace: "wifi.apsta_grace_period_s",
        telecafeGroup: "telecafe.group",
        telecafeSignalSource: "telecafe.signal_source",
        telecafeGpioNum: "telecafe.gpio_num",
        telecafeGpioActiveLevel: "telecafe.gpio_active_level",
        telecafeGpioDebounceMs: "telecafe.gpio_debounce_ms",
        telecafeSignalTtlS: "telecafe.signal_ttl_s",
        telecafePublishIntervalS: "telecafe.signal_publish_interval_s",
      };

      let configFieldsById = {};

      function showBanner(kind, text) {
        const el = document.getElementById("banner");
        el.className = "banner show " + kind;
        el.textContent = text;
      }

      function sdkconfigString(value) {
        return JSON.stringify(String(value || ""));
      }

      function fieldValue(id, fallback) {
        const field = configFieldsById[id] || {};
        if (field.value_hidden) {
          return fallback;
        }
        return field.value !== undefined ? field.value : fallback;
      }

      function fieldDefault(id, fallback) {
        const field = configFieldsById[id] || {};
        if (field.default_hidden) {
          return fallback;
        }
        return field.default !== undefined ? field.default : fallback;
      }

      function fieldNumber(id, fallback) {
        return Number(fieldValue(id, fallback));
      }

      function fieldString(id, fallback) {
        return String(fieldValue(id, fallback) || "");
      }

      function fieldHasFlag(field, flag) {
        return Array.isArray(field && field.flags) &&
          field.flags.some((entry) => entry && entry.flag === flag);
      }

      function buildMenuconfigDefaults() {
        const lines = [
          "# Exportado por /settings",
          "CONFIG_WIFI_STA_MAX_RETRY=" + Math.round(fieldNumber(CONFIG_IDS.staMaxRetry, 0)),
          "CONFIG_WIFI_APSTA_POLICY=" + Math.round(fieldNumber(CONFIG_IDS.apstaPolicy, 0)),
          "CONFIG_WIFI_APSTA_GRACE_PERIOD_S=" + Math.round(fieldNumber(CONFIG_IDS.apstaGrace, 0)),
          "CONFIG_TELE_CAFEZINHO_DEFAULT_GROUP=" + sdkconfigString(fieldString(CONFIG_IDS.telecafeGroup, "default")),
          "CONFIG_TELE_CAFEZINHO_DEFAULT_SIGNAL_SOURCE=" + sdkconfigString(fieldString(CONFIG_IDS.telecafeSignalSource, "gpio")),
          "CONFIG_TELE_CAFEZINHO_DEFAULT_GPIO_NUM=" + Math.round(fieldNumber(CONFIG_IDS.telecafeGpioNum, -1)),
          "CONFIG_TELE_CAFEZINHO_DEFAULT_GPIO_ACTIVE_LEVEL=" + Math.round(fieldNumber(CONFIG_IDS.telecafeGpioActiveLevel, 1)),
          "CONFIG_TELE_CAFEZINHO_DEFAULT_GPIO_DEBOUNCE_MS=" + Math.round(fieldNumber(CONFIG_IDS.telecafeGpioDebounceMs, 150)),
          "CONFIG_TELE_CAFEZINHO_DEFAULT_SIGNAL_TTL_S=" + Math.round(fieldNumber(CONFIG_IDS.telecafeSignalTtlS, 20)),
          "CONFIG_TELE_CAFEZINHO_DEFAULT_SIGNAL_PUBLISH_INTERVAL_S=" + Math.round(fieldNumber(CONFIG_IDS.telecafePublishIntervalS, 5)),
        ];

        const ssidField = configFieldsById[CONFIG_IDS.provisioningSsid] || {};
        const provisioningSsid = fieldString(CONFIG_IDS.provisioningSsid, "");
        if (ssidField.value_hidden) {
          lines.push("# CONFIG_WIFI_PROVISIONING_SSID oculto por politica de build");
        } else if (provisioningSsid) {
          lines.push("CONFIG_WIFI_PROVISIONING_SSID=" + sdkconfigString(provisioningSsid));
        }

        return {
          lines,
          text: lines.join("\n") + "\n",
        };
      }

      function downloadTextFile(fileName, text) {
        const blob = new Blob([text], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      async function exportSettings() {
        try {
          const [configResp, statusResp] = await Promise.all([
            fetch("/api/config/meta", { cache: "no-store" }),
            fetch("/api/status", { cache: "no-store" }),
          ]);

          if (!configResp.ok || !statusResp.ok) {
            throw new Error("export");
          }

          const configData = await configResp.json();
          const statusData = await statusResp.json();
          indexConfigFields(configData);
          const menuconfig = buildMenuconfigDefaults();
          const timestamp = new Date().toISOString();
          const safeTimestamp = timestamp.replace(/[:.]/g, "-");
          const exportPayload = {
            exported_at: timestamp,
            source: "/settings",
            firmware_version: statusData.firmware_version || "--",
            config_manifest: configData,
            menuconfig_defaults_preview: menuconfig.lines,
            menuconfig_defaults_text: menuconfig.text,
          };

          downloadTextFile("settings-export-" + safeTimestamp + ".json", JSON.stringify(exportPayload, null, 2));
          showBanner("ok", "Configuracoes exportadas.");
        } catch (err) {
          showBanner("error", "Falha ao exportar configuracoes.");
        }
      }

      function indexConfigFields(configData) {
        configFieldsById = {};
        (configData.fields || []).forEach((field) => {
          if (field && field.id) {
            configFieldsById[field.id] = field;
          }
        });
      }

      function renderApstaChoices(field) {
        const select = document.getElementById("wifiApstaPolicy");
        const choices = Array.isArray(field && field.choices) ? field.choices : [];
        if (!choices.length) {
          return;
        }

        select.innerHTML = "";
        choices.forEach((choice) => {
          const option = document.createElement("option");
          option.value = String(choice.value);
          option.textContent = choice.label || String(choice.value);
          select.appendChild(option);
        });
      }

      function setNumberBounds(elementId, field, fallbackMin, fallbackMax) {
        const element = document.getElementById(elementId);
        element.min = field && field.min !== undefined ? field.min : fallbackMin;
        element.max = field && field.max !== undefined ? field.max : fallbackMax;
      }

      function clampNumber(value, min, max, fallback) {
        const parsed = Number(value);
        if (!Number.isFinite(parsed)) {
          return fallback;
        }
        return Math.max(min, Math.min(max, parsed));
      }

      async function loadAll() {
        try {
          const [configResp, statusResp] = await Promise.all([
            fetch("/api/config/meta", { cache: "no-store" }),
            fetch("/api/status", { cache: "no-store" }),
          ]);

          if (!configResp.ok || !statusResp.ok) {
            throw new Error("load");
          }

          const configData = await configResp.json();
          const status = await statusResp.json();
          indexConfigFields(configData);

          const ssidField = configFieldsById[CONFIG_IDS.provisioningSsid] || {};
          const retryField = configFieldsById[CONFIG_IDS.staMaxRetry] || {};
          const policyField = configFieldsById[CONFIG_IDS.apstaPolicy] || {};
          const graceField = configFieldsById[CONFIG_IDS.apstaGrace] || {};
          const telecafeGroupField = configFieldsById[CONFIG_IDS.telecafeGroup] || {};
          const telecafeSignalSourceField = configFieldsById[CONFIG_IDS.telecafeSignalSource] || {};
          const telecafeGpioNumField = configFieldsById[CONFIG_IDS.telecafeGpioNum] || {};
          const telecafeGpioActiveLevelField = configFieldsById[CONFIG_IDS.telecafeGpioActiveLevel] || {};
          const telecafeGpioDebounceField = configFieldsById[CONFIG_IDS.telecafeGpioDebounceMs] || {};
          const telecafeTtlField = configFieldsById[CONFIG_IDS.telecafeSignalTtlS] || {};
          const telecafePublishField = configFieldsById[CONFIG_IDS.telecafePublishIntervalS] || {};

          renderApstaChoices(policyField);

          document.getElementById("settingsStatus").textContent =
            "Ultima atualizacao: " + new Date().toLocaleTimeString();
          document.getElementById("wifiProvisioningSsid").value = fieldString(CONFIG_IDS.provisioningSsid, "");
          document.getElementById("wifiProvisioningSsid").disabled =
            !!ssidField.value_hidden || fieldHasFlag(ssidField, "read_only");
          document.getElementById("wifiProvisioningSsid").placeholder =
            ssidField.value_hidden ? "Oculto por politica de build" : "";
          document.getElementById("wifiStaMaxRetry").min = retryField.min !== undefined ? retryField.min : 1;
          document.getElementById("wifiStaMaxRetry").max = retryField.max !== undefined ? retryField.max : 20;
          document.getElementById("wifiStaMaxRetry").value = fieldNumber(CONFIG_IDS.staMaxRetry, 3);
          document.getElementById("wifiApstaPolicy").value =
            String(fieldValue(CONFIG_IDS.apstaPolicy, 1));
          document.getElementById("wifiApstaGrace").min = graceField.min !== undefined ? graceField.min : 30;
          document.getElementById("wifiApstaGrace").max = graceField.max !== undefined ? graceField.max : 3600;
          document.getElementById("wifiApstaGrace").value = fieldNumber(CONFIG_IDS.apstaGrace, 600);
          document.getElementById("telecafeGroup").value = fieldString(CONFIG_IDS.telecafeGroup, "default");
          document.getElementById("telecafeGroup").disabled = fieldHasFlag(telecafeGroupField, "read_only");
          document.getElementById("telecafeSignalSource").value =
            fieldString(CONFIG_IDS.telecafeSignalSource, "gpio");
          document.getElementById("telecafeSignalSource").disabled =
            fieldHasFlag(telecafeSignalSourceField, "read_only");
          setNumberBounds("telecafeGpioNum", telecafeGpioNumField, -1, 48);
          document.getElementById("telecafeGpioNum").value = fieldNumber(CONFIG_IDS.telecafeGpioNum, -1);
          document.getElementById("telecafeGpioNum").disabled = fieldHasFlag(telecafeGpioNumField, "read_only");
          document.getElementById("telecafeGpioActiveLevel").value =
            String(fieldNumber(CONFIG_IDS.telecafeGpioActiveLevel, 1));
          document.getElementById("telecafeGpioActiveLevel").disabled =
            fieldHasFlag(telecafeGpioActiveLevelField, "read_only");
          setNumberBounds("telecafeGpioDebounceMs", telecafeGpioDebounceField, 20, 5000);
          document.getElementById("telecafeGpioDebounceMs").value =
            fieldNumber(CONFIG_IDS.telecafeGpioDebounceMs, 150);
          document.getElementById("telecafeGpioDebounceMs").disabled =
            fieldHasFlag(telecafeGpioDebounceField, "read_only");
          setNumberBounds("telecafeSignalTtlS", telecafeTtlField, 2, 3600);
          document.getElementById("telecafeSignalTtlS").value =
            fieldNumber(CONFIG_IDS.telecafeSignalTtlS, 20);
          document.getElementById("telecafeSignalTtlS").disabled = fieldHasFlag(telecafeTtlField, "read_only");
          setNumberBounds("telecafePublishIntervalS", telecafePublishField, 1, 3600);
          document.getElementById("telecafePublishIntervalS").value =
            fieldNumber(CONFIG_IDS.telecafePublishIntervalS, 5);
          document.getElementById("telecafePublishIntervalS").disabled =
            fieldHasFlag(telecafePublishField, "read_only");
          document.getElementById("wifiReadout").textContent =
            "Provisioning SSID " + (ssidField.value_hidden ? "oculto" : (fieldString(CONFIG_IDS.provisioningSsid, "") || "--")) +
            " | retry " + Number(status.wifi_sta_max_retry || 0) +
            " | politica APSTA " + Number(status.wifi_apsta_policy || 0) +
            " | grace " + Number(status.wifi_apsta_grace_period_s || 0) + " s";
          document.getElementById("telecafeReadout").textContent =
            "Grupo " + (status["telecafe.group"] || fieldString(CONFIG_IDS.telecafeGroup, "--")) +
            " | estado " + (status["telecafe.combined_state"] || "--") +
            " | local " + (status["telecafe.local_active"] ? "ativo" : "inativo") +
            " | remotos " + String(status["telecafe.remote_active_count"] || 0);
          document.getElementById("systemReadout").textContent =
            "Firmware " + (status.firmware_version || "--") +
            " | IP " + (status.ip || "--") +
            " | Wi-Fi " + (status.wifi_ready ? "pronto" : status.state || "--");
        } catch (err) {
          document.getElementById("settingsStatus").textContent = "Ultima atualizacao: indisponivel";
        }
      }

      async function setConfigValue(id, value) {
        const resp = await fetch("/api/config/set", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, value }),
        });
        const result = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          throw new Error(result.error || "config_set_failed");
        }
        return result;
      }

      async function resetConfigValue(id) {
        const resp = await fetch("/api/config/reset", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id }),
        });
        const result = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          throw new Error(result.error || "config_reset_failed");
        }
        return result;
      }

      async function saveDeviceConnectivity() {
        const provisioningSsid = document.getElementById("wifiProvisioningSsid").value.trim();
        const retryField = configFieldsById[CONFIG_IDS.staMaxRetry] || {};
        const graceField = configFieldsById[CONFIG_IDS.apstaGrace] || {};
        const updates = [
          [CONFIG_IDS.staMaxRetry,
           Math.round(clampNumber(document.getElementById("wifiStaMaxRetry").value,
                                  retryField.min !== undefined ? retryField.min : 1,
                                  retryField.max !== undefined ? retryField.max : 20,
                                  fieldDefault(CONFIG_IDS.staMaxRetry, 3)))],
          [CONFIG_IDS.apstaPolicy, Number(document.getElementById("wifiApstaPolicy").value || 1)],
          [CONFIG_IDS.apstaGrace,
           Math.round(clampNumber(document.getElementById("wifiApstaGrace").value,
                                  graceField.min !== undefined ? graceField.min : 30,
                                  graceField.max !== undefined ? graceField.max : 3600,
                                  fieldDefault(CONFIG_IDS.apstaGrace, 600)))],
        ];

        if (provisioningSsid && !document.getElementById("wifiProvisioningSsid").disabled) {
          updates.unshift([CONFIG_IDS.provisioningSsid, provisioningSsid]);
        }

        try {
          const results = [];
          for (const [id, value] of updates) {
            results.push(await setConfigValue(id, value));
          }
          const requiresReboot = results.some((result) => result.requires_reboot);
          showBanner("ok",
                     requiresReboot ?
                     "Conectividade salva. Alguns campos recomendam reboot." :
                     "Conectividade salva.");
          loadAll();
        } catch (err) {
          showBanner("error", "Falha ao salvar conectividade: " + (err.message || "--"));
        }
      }

      async function resetDeviceConnectivity() {
        if (!confirm("Restaurar defaults de conectividade?")) {
          return;
        }

        try {
          const ids = [
            CONFIG_IDS.provisioningSsid,
            CONFIG_IDS.staMaxRetry,
            CONFIG_IDS.apstaPolicy,
            CONFIG_IDS.apstaGrace,
          ];
          const results = [];
          for (const id of ids) {
            results.push(await resetConfigValue(id));
          }
          const requiresReboot = results.some((result) => result.requires_reboot);
          showBanner("ok",
                     requiresReboot ?
                     "Defaults restaurados. Alguns campos recomendam reboot." :
                     "Defaults restaurados.");
          loadAll();
        } catch (err) {
          showBanner("error", "Falha ao restaurar defaults: " + (err.message || "--"));
        }
      }

      function clampedInputNumber(elementId, configId, fallback) {
        const element = document.getElementById(elementId);
        return Math.round(clampNumber(element.value,
                                      Number(element.min),
                                      Number(element.max),
                                      fieldDefault(configId, fallback)));
      }

      function addUpdateIfEnabled(updates, elementId, id, value) {
        if (!document.getElementById(elementId).disabled) {
          updates.push([id, value]);
        }
      }

      async function saveTeleCafezinho() {
        const group = document.getElementById("telecafeGroup").value.trim();
        if (!group) {
          showBanner("error", "Informe um grupo TeleCafezinho.");
          return;
        }

        const updates = [];
        addUpdateIfEnabled(updates, "telecafeGroup", CONFIG_IDS.telecafeGroup, group);
        addUpdateIfEnabled(updates, "telecafeSignalSource", CONFIG_IDS.telecafeSignalSource,
                           document.getElementById("telecafeSignalSource").value || "gpio");
        addUpdateIfEnabled(updates, "telecafeGpioNum", CONFIG_IDS.telecafeGpioNum,
                           clampedInputNumber("telecafeGpioNum", CONFIG_IDS.telecafeGpioNum, -1));
        addUpdateIfEnabled(updates, "telecafeGpioActiveLevel", CONFIG_IDS.telecafeGpioActiveLevel,
                           Number(document.getElementById("telecafeGpioActiveLevel").value || 1));
        addUpdateIfEnabled(updates, "telecafeGpioDebounceMs", CONFIG_IDS.telecafeGpioDebounceMs,
                           clampedInputNumber("telecafeGpioDebounceMs", CONFIG_IDS.telecafeGpioDebounceMs, 150));
        addUpdateIfEnabled(updates, "telecafeSignalTtlS", CONFIG_IDS.telecafeSignalTtlS,
                           clampedInputNumber("telecafeSignalTtlS", CONFIG_IDS.telecafeSignalTtlS, 20));
        addUpdateIfEnabled(updates, "telecafePublishIntervalS", CONFIG_IDS.telecafePublishIntervalS,
                           clampedInputNumber("telecafePublishIntervalS",
                                              CONFIG_IDS.telecafePublishIntervalS,
                                              5));

        try {
          const results = [];
          for (const [id, value] of updates) {
            results.push(await setConfigValue(id, value));
          }
          const requiresReboot = results.some((result) => result.requires_reboot);
          showBanner("ok",
                     requiresReboot ?
                     "TeleCafezinho salvo. Alguns campos recomendam reboot." :
                     "TeleCafezinho salvo.");
          loadAll();
        } catch (err) {
          showBanner("error", "Falha ao salvar TeleCafezinho: " + (err.message || "--"));
        }
      }

      async function resetTeleCafezinho() {
        if (!confirm("Restaurar defaults do TeleCafezinho?")) {
          return;
        }

        try {
          const ids = [
            CONFIG_IDS.telecafeGroup,
            CONFIG_IDS.telecafeSignalSource,
            CONFIG_IDS.telecafeGpioNum,
            CONFIG_IDS.telecafeGpioActiveLevel,
            CONFIG_IDS.telecafeGpioDebounceMs,
            CONFIG_IDS.telecafeSignalTtlS,
            CONFIG_IDS.telecafePublishIntervalS,
          ];
          const results = [];
          for (const id of ids) {
            results.push(await resetConfigValue(id));
          }
          const requiresReboot = results.some((result) => result.requires_reboot);
          showBanner("ok",
                     requiresReboot ?
                     "Defaults do TeleCafezinho restaurados. Alguns campos recomendam reboot." :
                     "Defaults do TeleCafezinho restaurados.");
          loadAll();
        } catch (err) {
          showBanner("error", "Falha ao restaurar TeleCafezinho: " + (err.message || "--"));
        }
      }

      async function restartDevice() {
        if (!confirm("Reiniciar a placa agora?")) {
          return;
        }
        const resp = await fetch("/api/restart", { method: "POST" });
        const text = await resp.text();
        showBanner(resp.ok ? "ok" : "error", resp.ok ? "Restart solicitado." : text);
      }

      loadAll();
    </script>
  </body>
</html>
